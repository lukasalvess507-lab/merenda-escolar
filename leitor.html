<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor QR - Merenda</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #2f3a73;
    color: white;
}
#reader {
    width: 300px;
    margin: auto;
}
#status {
    margin-top: 15px;
    font-size: 18px;
}
</style>
</head>

<body>

<h2>Leitor de QR Code</h2>

<div id="reader"></div>
<p id="status">Aguardando leitura...</p>

<audio id="bip" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SIUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const html5QrCode = new Html5Qrcode("reader");

let bloqueado = false;

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {

        let cameraId = devices[devices.length - 1].id;

        html5QrCode.start(
            cameraId,
            { fps: 10, qrbox: 250 },
            async (decodedText) => {

                if (bloqueado) return;

                bloqueado = true;

                document.getElementById("status").innerText = "Lendo QR Code...";

                const hoje = new Date().toLocaleDateString();

                const q = query(
                    collection(db, "registros"),
                    where("codigo", "==", decodedText),
                    where("data", "==", hoje)
                );

                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    document.getElementById("status").innerText = "Aluno já registrado hoje";
                    
                    setTimeout(() => {
                        bloqueado = false;
                        document.getElementById("status").innerText = "Aguardando leitura...";
                    }, 3000);

                    return;
                }

                const alunoRef = doc(db, "alunos", decodedText);
                const alunoSnap = await getDoc(alunoRef);

                let nome = "Não encontrado";

                if (alunoSnap.exists()) {
                    nome = alunoSnap.data().nome;
                }

                document.getElementById("status").innerText = "Registrado: " + nome;

                document.getElementById("bip").play();

                await addDoc(collection(db, "registros"), {
                    codigo: decodedText,
                    nome: nome,
                    data: hoje,
                    hora: new Date().toLocaleTimeString()
                });

                setTimeout(() => {
                    bloqueado = false;
                    document.getElementById("status").innerText = "Aguardando leitura...";
                }, 3000);
            },
            (errorMessage) => {}
        );
    }
});

</script>

</body>
</html>
