<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor QR</title>

<style>
body{
    font-family: Arial;
    background:#2f3a73;
    color:white;
    text-align:center;
}

#mensagem{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.erro{
    background:red;
    color:white;
    padding:10px;
}

.sucesso{
    background:green;
    color:white;
    padding:10px;
}
</style>
</head>

<body>

<h2>Leitor QR Code</h2>

<video id="preview" width="300"></video>

<div id="mensagem">Aguardando leitura...</div>

<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const hoje = new Date().toISOString().split("T")[0];

window.processarLeitura = async function(codigo){

    const user = auth.currentUser;

    const ref = doc(db, "escolas", user.uid, "registros", hoje + "_" + codigo);

    const jaExiste = await getDoc(ref);

    if(jaExiste.exists()){

        const msg = document.getElementById("mensagem");
        msg.innerText = "ALUNO JÁ REGISTRADO HOJE";
        msg.className = "erro";

        setTimeout(()=>{
            msg.innerText = "Aguardando leitura...";
            msg.className = "";
        },2000);

        return;
    }

    await setDoc(ref,{
        codigo: codigo,
        data: hoje,
        hora: new Date().toLocaleTimeString()
    });

    const msg = document.getElementById("mensagem");
    msg.innerText = "REGISTRADO COM SUCESSO";
    msg.className = "sucesso";

    setTimeout(()=>{
        msg.innerText = "Aguardando leitura...";
        msg.className = "";
    },2000);
};

window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
