<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor QR Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background:#2f3a73;
    color:white;
    text-align:center;
}

#reader{
    width:300px;
    margin:auto;
}

#mensagem{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.erro{
    background:red;
    padding:10px;
}

.sucesso{
    background:green;
    padding:10px;
}
</style>
</head>

<body>

<h2>Leitor QR Code</h2>

<div id="reader"></div>

<div id="mensagem">Aguardando leitura...</div>

<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const hoje = new Date().toISOString().split("T")[0];
const msg = document.getElementById("mensagem");

let bloqueado = false;

// 🔊 SOM (BIP)
function bip(){
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
}

// MENSAGEM
function mostrar(texto, tipo){
    msg.innerText = texto;
    msg.className = tipo;

    setTimeout(()=>{
        msg.innerText = "Aguardando leitura...";
        msg.className = "";
        bloqueado = false;
    },2000);
}

// PROCESSAR QR
async function processar(codigo){

    if(bloqueado) return;
    bloqueado = true;

    const user = auth.currentUser;
    if(!user){
        mostrar("Erro de login", "erro");
        return;
    }

    const ref = doc(db, "escolas", user.uid, "registros", hoje + "_" + codigo);

    const jaExiste = await getDoc(ref);

    if(jaExiste.exists()){
        bip();
        mostrar("ALUNO JÁ REGISTRADO HOJE", "erro");
        return;
    }

    await setDoc(ref,{
        codigo: codigo,
        data: hoje,
        hora: new Date().toLocaleTimeString()
    });

    bip();
    mostrar("REGISTRADO COM SUCESSO", "sucesso");
}

// INICIAR CÂMERA (TRASEIRA)
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

        let traseira = devices.find(d => d.label.toLowerCase().includes("back"));

        let cameraId = traseira ? traseira.id : devices[devices.length - 1].id;

        html5QrCode.start(
            cameraId,
            {
                fps: 10,
                qrbox: 250
            },
            (decodedText) => {
                processar(decodedText);
            }
        );
    }
});

// VOLTAR
window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
