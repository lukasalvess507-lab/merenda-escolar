<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 20px;
}

#reader{
    width: 300px;
    margin: auto;
}

#status{
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<h2>Leitor de QR Code</h2>

<div id="reader"></div>
<p id="status">Aguardando leitura...</p>

<audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let usuario = null;
let lendo = false;

// 🔐 garante login
onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    } else {
        usuario = user;
        iniciarCamera();
    }
});

// 📅 data do dia
function hoje(){
    const d = new Date();
    return d.toISOString().split("T")[0];
}

// 🎥 iniciar câmera
function iniciarCamera(){

    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras().then(devices => {
        const cameraId = devices[devices.length - 1].id;

        html5QrCode.start(
            cameraId,
            { fps: 10, qrbox: 250 },
            async (codigo) => {

                if(lendo) return;
                lendo = true;

                document.getElementById("status").innerText = "Lendo...";

                // 🔍 buscar aluno
                const alunoRef = doc(db, "escolas", usuario.uid, "alunos", codigo);
                const alunoSnap = await getDoc(alunoRef);

                if(!alunoSnap.exists()){
                    document.getElementById("status").innerText = "Aluno não encontrado";
                    lendo = false;
                    return;
                }

                const aluno = alunoSnap.data();

                const registroRef = doc(db, "escolas", usuario.uid, "registros", hoje()+"_"+codigo);
                const registroSnap = await getDoc(registroRef);

                // 🚫 bloqueio de repetição
                if(registroSnap.exists()){
                    document.getElementById("status").innerText = "Já registrado hoje: " + aluno.nome;
                    lendo = false;
                    return;
                }

                // 💾 salvar registro
                await setDoc(registroRef, {
                    codigo: codigo,
                    nome: aluno.nome,
                    data: hoje(),
                    hora: new Date().toLocaleTimeString()
                });

                // 🔊 bip
                document.getElementById("beep").play();

                document.getElementById("status").innerText = "Registrado: " + aluno.nome;

                // ⏱ liberar nova leitura
                setTimeout(() => {
                    lendo = false;
                    document.getElementById("status").innerText = "Aguardando leitura...";
                }, 2000);

            },
            (erro) => {}
        );
    });

}

</script>

</body>
</html>
