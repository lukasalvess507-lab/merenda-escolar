<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
}

#reader{
    width:300px;
    margin:auto;
}

#msg{
    margin-top:15px;
    font-size:18px;
}

#barra{
    height:10px;
    width:100%;
    margin-top:10px;
}

.verde{
    background:green;
}

.vermelho{
    background:red;
}

button{
    margin-top:15px;
    padding:12px;
    width:90%;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Leitor de QR Code</p>

<div id="reader"></div>

<div id="msg">Aguardando leitura...</div>
<div id="barra"></div>

<button onclick="window.location.href='index.html'">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let ultimoCodigo = "";
let bloqueado = false;

function bip(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = ctx.createOscillator();
    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(800, ctx.currentTime);
    oscillator.connect(ctx.destination);
    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.1);
}

function hojeBrasil(){
    const agora = new Date();
    agora.setHours(agora.getHours() - 3);
    return agora.toLocaleDateString('pt-BR');
}

async function onScanSuccess(decodedText){

    if(bloqueado) return;

    bloqueado = true;

    const codigoLido = decodedText.trim();

    // evitar leitura repetida imediata
    if(codigoLido === ultimoCodigo){
        bloqueado = false;
        return;
    }

    ultimoCodigo = codigoLido;

    // 🔎 BUSCAR ALUNO PELO CÓDIGO (CORRETO)
    const q = query(collection(db, "alunos"), where("codigo", "==", codigoLido));
    const querySnapshot = await getDocs(q);

    if(querySnapshot.empty){
        document.getElementById("msg").innerText = "Aluno não encontrado";
        mostrarBarra("vermelho");
        setTimeout(liberar,2000);
        return;
    }

    let aluno;
    querySnapshot.forEach(doc => {
        aluno = doc.data();
    });

    const hoje = hojeBrasil();

    // verificar se já registrou hoje
    const q2 = query(
        collection(db, "registros"),
        where("codigo", "==", codigoLido),
        where("data", "==", hoje)
    );

    const registroHoje = await getDocs(q2);

    if(!registroHoje.empty){
        document.getElementById("msg").innerText = aluno.nome + " já registrado hoje";
        mostrarBarra("vermelho");
        bip();
        setTimeout(liberar,3000);
        return;
    }

    // salvar registro
    await addDoc(collection(db, "registros"), {
        nome: aluno.nome,
        codigo: codigoLido,
        data: hoje,
        hora: new Date().toLocaleTimeString()
    });

    document.getElementById("msg").innerText = aluno.nome + " registrado!";
    mostrarBarra("verde");
    bip();

    setTimeout(liberar,3000);

}

function mostrarBarra(cor){
    const barra = document.getElementById("barra");
    barra.className = "";
    barra.classList.add(cor);
}

function liberar(){
    document.getElementById("msg").innerText = "Aguardando leitura...";
    document.getElementById("barra").className = "";
    bloqueado = false;
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
);

</script>

</body>
</html>
