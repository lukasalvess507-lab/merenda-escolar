<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor QR - Merenda</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #2f3a73;
    color: white;
}
#reader {
    width: 300px;
    margin: auto;
}
</style>
</head>

<body>

<h2>Leitor de QR Code</h2>

<div id="reader"></div>
<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SIUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const html5QrCode = new Html5Qrcode("reader");

let ultimoCodigo = null;

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {

        let cameraId = devices[devices.length - 1].id;

        html5QrCode.start(
            cameraId,
            { fps: 10, qrbox: 250 },
            async (decodedText) => {

                if(decodedText === ultimoCodigo){
                    return;
                }

                ultimoCodigo = decodedText;

                const alunoRef = doc(db, "alunos", decodedText);
                const alunoSnap = await getDoc(alunoRef);

                let nome = "Não encontrado";

                if (alunoSnap.exists()) {
                    nome = alunoSnap.data().nome;
                }

                document.getElementById("status").innerText =
                    "Lido: " + decodedText + " - " + nome;

                await addDoc(collection(db, "registros"), {
                    codigo: decodedText,
                    nome: nome,
                    data: new Date().toLocaleDateString(),
                    hora: new Date().toLocaleTimeString()
                });

                setTimeout(() => {
                    ultimoCodigo = null;
                }, 3000);
            },
            (errorMessage) => {}
        );
    }
});

</script>

</body>
</html>
