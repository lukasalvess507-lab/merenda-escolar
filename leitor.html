<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leitor QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background:#2f3a73;
    color:white;
    text-align:center;
}

#reader{
    width:300px;
    margin:auto;
}

#mensagem{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.erro{
    background:red;
    padding:10px;
}

.sucesso{
    background:green;
    padding:10px;
}
</style>
</head>

<body>

<h2>Leitor QR Code</h2>

<div id="reader"></div>

<div id="mensagem">Aguardando leitura...</div>

<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const hoje = new Date().toISOString().split("T")[0];

const msg = document.getElementById("mensagem");

function mostrarMensagem(texto, tipo){

    msg.innerText = texto;
    msg.className = tipo;

    setTimeout(()=>{
        msg.innerText = "Aguardando leitura...";
        msg.className = "";
    },2000);
}

async function processarLeitura(codigo){

    const user = auth.currentUser;

    const ref = doc(db, "escolas", user.uid, "registros", hoje + "_" + codigo);

    const jaExiste = await getDoc(ref);

    if(jaExiste.exists()){
        mostrarMensagem("ALUNO JÁ REGISTRADO HOJE", "erro");
        return;
    }

    await setDoc(ref,{
        codigo: codigo,
        data: hoje,
        hora: new Date().toLocaleTimeString()
    });

    mostrarMensagem("REGISTRADO COM SUCESSO", "sucesso");
}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        const cameraId = devices[0].id;

        html5QrCode.start(
            cameraId,
            {
                fps: 10,
                qrbox: 250
            },
            (decodedText) => {
                processarLeitura(decodedText);
            }
        );
    }
});

window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
