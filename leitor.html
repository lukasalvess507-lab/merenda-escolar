<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor QR - S.C.A.E</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

#reader{
    width:100%;
}

/* BARRA DE FEEDBACK */
#barra{
    width:100%;
    height:10px;
    margin-top:10px;
    border-radius:5px;
    background: transparent;
    transition: 0.3s;
}

#msg{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
    min-height:30px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Leitor de QR Code</p>

<div class="container">

<div id="reader"></div>

<div id="barra"></div>

<p id="msg">Aguardando leitura...</p>

<button onclick="window.location.href='index.html'">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hoje = new Date().toISOString().split("T")[0];

const msg = document.getElementById("msg");
const barra = document.getElementById("barra");

let bloqueado = false;

/* 🔊 BIP MAIS CONFIÁVEL */
function beep(){
    try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = 800;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
    }catch(e){}
}

/* FEEDBACK VISUAL */
function feedback(cor, texto){

    barra.style.background = cor;
    msg.innerText = texto;

    setTimeout(() => {
        barra.style.background = "transparent";
        msg.innerText = "Aguardando leitura...";
        bloqueado = false;
    }, 3000);
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    { fps: 8, qrbox: 250 }, // leitura mais estável
    async (codigo) => {

        if(bloqueado) return;
        bloqueado = true;

        msg.innerText = "Lendo...";

        const alunoRef = doc(db, "alunos", codigo);
        const alunoSnap = await getDoc(alunoRef);

        if (!alunoSnap.exists()) {
            feedback("orange", "Aluno não encontrado");
            return;
        }

        const nome = alunoSnap.data().nome;

        const registroRef = doc(db, "registros", codigo + "_" + hoje);
        const registroSnap = await getDoc(registroRef);

        if (registroSnap.exists()) {
            beep();
            feedback("red", "ALUNO JÁ REGISTRADO");
            return;
        }

        const hora = new Date().toLocaleTimeString();

        await setDoc(registroRef, {
            nome: nome,
            codigo: codigo,
            data: hoje,
            hora: hora
        });

        beep();
        feedback("green", nome.toUpperCase());

    }
);

</script>

</body>
</html>
