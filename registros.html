<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Relatório do Dia</title>

<style>
body{
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 20px;
}

.container{
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

.item{
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

h3{
    margin-top: 20px;
}

button{
    margin-top: 15px;
    padding: 10px;
}
</style>
</head>

<body>

<h2>Relatório do Dia</h2>
<h3 id="data"></h3>

<div class="container" id="lista">Carregando...</div>

<h3 id="total"></h3>

<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ✅ DATA CORRIGIDA (BRASIL)
function hoje(){
    const d = new Date();
    return d.toLocaleDateString("sv-SE");
}

// mostra data na tela
document.getElementById("data").innerText = "Data: " + hoje();

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const uid = user.uid;
    const lista = document.getElementById("lista");
    const total = document.getElementById("total");

    onSnapshot(collection(db, "escolas", uid, "registros"), (snapshot) => {

        lista.innerHTML = "";
        let contador = 0;

        snapshot.forEach((doc) => {

            const dado = doc.data();

            if(dado.data === hoje()){

                contador++;

                lista.innerHTML += `
                    <div class="item">
                        <strong>${dado.nome}</strong><br>
                        Código: ${dado.codigo}<br>
                        Hora: ${dado.hora}
                    </div>
                `;
            }

        });

        if(contador === 0){
            lista.innerHTML = "Nenhum registro hoje";
        }

        total.innerText = "Total de alunos: " + contador;

    });

});

window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
