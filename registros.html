<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Resumo do Dia</title>

<style>
body {
  font-family: Arial;
  background: #2f4f6f;
  margin: 0;
  padding: 0;
  color: white;
  text-align: center;
}

.container {
  background: white;
  color: black;
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 10px;
}

select {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

.item {
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
}

button {
  margin-top: 20px;
  padding: 10px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Resumo do Dia</p>

<div class="container">

<select id="filtroTurma">
  <option value="todas">Todas as turmas</option>
</select>

<h3 id="total"></h3>

<div id="lista"></div>

<button onclick="history.back()">Voltar</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = "escola_antonio_barros";

const lista = document.getElementById("lista");
const total = document.getElementById("total");
const filtro = document.getElementById("filtroTurma");

let registros = [];
let alunosMap = {};

onSnapshot(collection(db, "escolas", escolaId, "alunos"), (snap) => {
  alunosMap = {};
  snap.forEach(doc => {
    const d = doc.data();
    alunosMap[String(d.codigo)] = d.turma || "Sem turma";
  });
});

onSnapshot(collection(db, "escolas", escolaId, "registros"), (snapshot) => {
  registros = [];
  const hoje = new Date().toLocaleDateString("pt-BR");

  snapshot.forEach(doc => {
    const d = doc.data();

    if (d.data === hoje) {
      registros.push({
        nome: d.nome,
        codigo: String(d.codigo),
        turma: alunosMap[String(d.codigo)] || "Sem turma"
      });
    }
  });

  montarFiltro();
  renderizar();
});

function montarFiltro() {
  const turmas = new Set();

  registros.forEach(r => turmas.add(r.turma));

  filtro.innerHTML = '<option value="todas">Todas as turmas</option>';

  turmas.forEach(t => {
    filtro.innerHTML += `<option value="${t}">${t}</option>`;
  });
}

function renderizar() {
  lista.innerHTML = "";
  const turmaSelecionada = filtro.value;
  let contador = 0;

  registros.forEach(r => {
    if (turmaSelecionada !== "todas" && r.turma !== turmaSelecionada) return;

    contador++;

    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = r.nome + "<br><small>" + r.turma + "</small>";

    lista.appendChild(div);
  });

  total.innerText = "Total: " + contador + " alunos";
}

filtro.addEventListener("change", renderizar);
</script>

</body>
</html>
