<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Relatório</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 20px;
}

.container{
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

.item{
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

button{
    margin-top: 10px;
    padding: 10px;
    width: 100%;
}

input{
    padding: 8px;
    margin-top: 10px;
    width: 100%;
}
</style>
</head>

<body>

<h2>Relatório</h2>

<input type="date" id="filtroData">

<div class="container" id="lista">Carregando...</div>

<h3 id="total"></h3>

<button onclick="gerarPDF()">Exportar PDF</button>
<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let registrosCache = [];

// DATA BRASIL
function hoje(){
    return new Date().toLocaleDateString("sv-SE");
}

// DATA INICIAL
document.getElementById("filtroData").value = hoje();

// LOGIN
onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    onSnapshot(collection(db, "escolas", user.uid, "registros"), (snapshot) => {

        registrosCache = [];

        snapshot.forEach((doc) => {
            registrosCache.push(doc.data());
        });

        renderizar();

    });

});

// RENDERIZA
function renderizar(){

    const dataFiltro = document.getElementById("filtroData").value;
    const lista = document.getElementById("lista");
    const total = document.getElementById("total");

    lista.innerHTML = "";
    let contador = 0;

    registrosCache.forEach((r) => {

        if(r.data === dataFiltro){

            contador++;

            lista.innerHTML += `
                <div class="item">
                    <strong>${r.nome}</strong><br>
                    Código: ${r.codigo}<br>
                    Hora: ${r.hora}
                </div>
            `;
        }

    });

    if(contador === 0){
        lista.innerHTML = "Nenhum registro nessa data";
    }

    total.innerText = "Total de alunos: " + contador;
}

// FILTRO
document.getElementById("filtroData").addEventListener("change", renderizar);

// PDF
window.gerarPDF = function(){

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const dataFiltro = document.getElementById("filtroData").value;
    let y = 20;

    doc.setFontSize(16);
    doc.text("Relatório de Merenda", 20, y);

    y += 10;
    doc.setFontSize(12);
    doc.text("Data: " + dataFiltro, 20, y);

    y += 10;

    registrosCache.forEach((r) => {

        if(r.data === dataFiltro){

            doc.text(
                r.nome + " | Código: " + r.codigo + " | " + r.hora,
                20,
                y
            );

            y += 8;
        }

    });

    doc.save("relatorio.pdf");
}

// VOLTAR
window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
