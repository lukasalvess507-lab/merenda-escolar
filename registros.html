<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumo do Dia</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

.item{
    margin:10px 0;
    padding:10px;
    border-bottom:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Resumo do Dia</p>

<div class="container">

<h3 id="total">Total: 0</h3>

<div id="lista"></div>

<button onclick="window.location.href='index.html'">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hoje = new Date().toISOString().split("T")[0];

const lista = document.getElementById("lista");
const total = document.getElementById("total");

onSnapshot(collection(db, "registros"), (snapshot) => {

    lista.innerHTML = "";
    let contador = 0;

    snapshot.forEach(doc => {

        const dados = doc.data();

        if(dados.data === hoje){

            contador++;

            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <strong>${dados.nome}</strong><br>
                ${dados.hora}
            `;

            lista.appendChild(div);
        }

    });

    total.innerText = "Total: " + contador;

});

</script>

</body>
</html>
