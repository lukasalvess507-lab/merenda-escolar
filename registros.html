<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Relatório</title>

<style>
body{
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 20px;
}

.topo{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.container{
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

.item{
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

button{
    margin-top: 10px;
    padding: 10px;
}

input{
    padding: 8px;
    margin-top: 10px;
    width: 100%;
}
</style>
</head>

<body>

<div class="topo">
    <div id="escola">Escola</div>
    <button onclick="sair()">Sair</button>
</div>

<h2>Relatório</h2>

<input type="date" id="filtroData">

<div class="container" id="lista">Carregando...</div>

<h3 id="total"></h3>

<button onclick="exportar()">Exportar Relatório</button>
<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let registrosCache = [];
let uidAtual = null;

// DATA BRASIL
function hoje(){
    return new Date().toLocaleDateString("sv-SE");
}

// já inicia com hoje selecionado
document.getElementById("filtroData").value = hoje();

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    uidAtual = user.uid;

    // Nome da escola (email)
    document.getElementById("escola").innerText = user.email;

    onSnapshot(collection(db, "escolas", uidAtual, "registros"), (snapshot) => {

        registrosCache = [];

        snapshot.forEach((doc) => {
            registrosCache.push(doc.data());
        });

        renderizar();

    });

});

// RENDERIZA LISTA
function renderizar(){

    const dataFiltro = document.getElementById("filtroData").value;
    const lista = document.getElementById("lista");
    const total = document.getElementById("total");

    lista.innerHTML = "";

    let contador = 0;

    registrosCache.forEach((r) => {

        if(r.data === dataFiltro){

            contador++;

            lista.innerHTML += `
                <div class="item">
                    <strong>${r.nome}</strong><br>
                    Código: ${r.codigo}<br>
                    Hora: ${r.hora}
                </div>
            `;
        }

    });

    if(contador === 0){
        lista.innerHTML = "Nenhum registro nessa data";
    }

    total.innerText = "Total de alunos: " + contador;
}

// muda data automaticamente
document.getElementById("filtroData").addEventListener("change", renderizar);

// EXPORTAR
window.exportar = function(){

    const dataFiltro = document.getElementById("filtroData").value;

    let texto = "Relatório - " + dataFiltro + "\n\n";

    registrosCache.forEach((r) => {
        if(r.data === dataFiltro){
            texto += r.nome + " - Código: " + r.codigo + " - Hora: " + r.hora + "\n";
        }
    });

    const blob = new Blob([texto], { type: "text/plain" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "relatorio.txt";
    link.click();
}

// SAIR
window.sair = function(){
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
}

// VOLTAR
window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
