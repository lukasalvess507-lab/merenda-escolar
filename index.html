<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel - Merenda Escolar</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #2f3a73, #3f4fa0);
    color: white;
}

.container {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    margin-bottom: 30px;
}

.card {
    background: white;
    color: #333;
    border-radius: 12px;
    padding: 20px;
    max-width: 400px;
    margin: auto;
}

button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: #2f3a73;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #1f2a5a;
}
</style>

</head>

<body>

<div class="container">
    <h1>Painel Merenda Escolar</h1>

    <div class="card">

        <button onclick="ir('leitor.html')">Ler QR Code</button>

        <button onclick="ir('cadastro.html')">Cadastrar Aluno</button>

        <button onclick="alert('Em breve')">Ver Alunos</button>

        <button onclick="ir('registros.html')">Registros do Dia</button>

        <button onclick="alert('Histórico em breve')">Histórico</button>

        <button onclick="abrirQR()">Gerar QR Code</button>

    </div>
</div>

<script>

function ir(pagina){
    window.location.href = pagina;
}

function abrirQR(){
    window.open("https://www.the-qrcode-generator.com/", "_blank");
}

</script>

</body>
</html>
