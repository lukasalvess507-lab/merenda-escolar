<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Merenda Escolar</title>

<style>
body {
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 30px;
}

/* TOPO */
.topo{
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 350px;
    margin: auto;
    margin-bottom: 20px;
}

#escola{
    font-size: 14px;
    font-weight: bold;
}

/* CAIXA */
.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 350px;
    margin: auto;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    background: #2f3a73;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
}

/* BOTÃO SAIR */
#sair{
    width: auto;
    padding: 6px 10px;
    font-size: 12px;
}
</style>

</head>

<body>

<!-- TOPO -->
<div class="topo">
    <div id="escola">Carregando...</div>
    <button id="sair" onclick="logout()">Sair</button>
</div>

<h2>Painel Merenda Escolar</h2>

<div class="container">

<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='importar.html'">Importar Alunos</button>
<button onclick="location.href='leitor.html'">Ler QR Code</button>
<button onclick="location.href='cadastro.html'">Cadastrar Aluno</button>
<button onclick="location.href='alunos.html'">Ver Alunos</button>
<button onclick="location.href='registros.html'">Resumo do Dia</button>
<button onclick="location.href='historico.html'">Histórico</button>
<button onclick="location.href='grafico.html'">Gráfico</button>
<button onclick="location.href='qrcode.html'">Gerar QR Code</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// PROTEÇÃO + NOME DA ESCOLA
onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("escola").innerText = user.email;

});

// LOGOUT
window.logout = function(){
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
}

</script>

</body>
</html>
