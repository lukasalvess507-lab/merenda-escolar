<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>S.C.A.E</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color: white;
    text-align: center;
    padding: 30px;

    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.topo{
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 350px;
    margin: auto;
    margin-bottom: 20px;
}

#escola{
    font-size: 13px;
    font-weight: bold;
}

.container {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 350px;
    margin: auto;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:15px;
}

button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    background: #1f4d2e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: bold;

    cursor: pointer;
    transition: all 0.2s;
}

button:hover {
    background: #163822;
}

button:active {
    transform: scale(0.96);
}

#sair{
    width: auto;
    padding: 6px 10px;
    font-size: 12px;
}
</style>

</head>

<body>

<div class="topo">
    <div id="escola">Carregando...</div>
    <button id="sair" onclick="logout()">Sair</button>
</div>

<h2>S.C.A.E</h2>
<p>Sistema de Controle de Almoço Escolar</p>

<div class="container">

<button onclick="location.href='dashboard.html'">Dashboard</button>
<button onclick="location.href='importar.html'">Importar Alunos</button>
<button onclick="location.href='leitor.html'">Ler QR Code</button>
<button onclick="location.href='cadastro.html'">Cadastrar Aluno</button>
<button onclick="location.href='alunos.html'">Ver Alunos</button>
<button onclick="location.href='registros.html'">Resumo do Dia</button>
<button onclick="location.href='historico.html'">Histórico</button>
<button onclick="location.href='grafico.html'">Gráfico</button>
<button onclick="location.href='qrcode.html'">Gerar QR Code</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }
    document.getElementById("escola").innerText = user.email;
});

window.logout = function(){
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
}

</script>

</body>
</html>
