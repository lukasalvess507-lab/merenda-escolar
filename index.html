<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel - Merenda Escolar</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#2f3a73,#3c4fa0);
    color:white;
}

.recipiente{
    text-align:center;
    padding:40px 20px;
}

h1{
    margin-bottom:30px;
}

.cartao{
    background:white;
    color:#333;
    border-radius:12px;
    padding:20px;
    max-width:400px;
    margin:auto;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#2f3a73;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="recipiente">
<h1>Painel Merenda Escolar</h1>

<div class="cartao">

<button onclick="ir('leitor.html')">Ler QR Code</button>

<button onclick="ir('cadastro.html')">Cadastrar Aluno</button>

<button onclick="ir('alunos.html')">Ver Alunos</button>

<button onclick="ir('registros.html')">Registros do Dia</button>

<button onclick="ir('historico.html')">Histórico</button>

<button onclick="abrirGerador()">Gerar QR Code</button>

<button onclick="logout()">Sair</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SIUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "login.html";
    }
});

window.logout = function(){
    signOut(auth).then(() => {
        window.location.href = "login.html";
    });
}

window.ir = function(pagina){
    window.location.href = pagina;
}

window.abrirGerador = function(){
    window.open("https://www.the-qrcode-generator.com/", "_blank");
}

</script>

</body>
</html>
