<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfico - S.C.A.E</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Frequência da Merenda</p>

<div class="container">
<canvas id="grafico"></canvas>
</div>

<button onclick="voltar()">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregarGrafico(){

    const snapshot = await getDocs(collection(db, "registros"));

    const dados = {};

    snapshot.forEach(doc => {
        const d = doc.data();
        dados[d.data] = (dados[d.data] || 0) + 1;
    });

    const labels = Object.keys(dados);
    const valores = Object.values(dados);

    new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Alunos por dia",
                data: valores,
                backgroundColor: "#1f4d2e"
            }]
        }
    });

}

carregarGrafico();

window.voltar = function(){
    window.location.href="index.html";
}

</script>

</body>
</html>
