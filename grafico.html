<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfico</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:400px;
    margin:40px auto;
}

button{
    width:90%;
    padding:12px;
    margin-top:15px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Frequência da Merenda</p>

<div class="container">
    <canvas id="grafico"></canvas>
</div>

<button onclick="window.location.href='index.html'">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 Corrigir formato de data
function formatarData(data){
    if(!data) return null;

    if(data.includes("/")) return data;

    if(data.includes("-")){
        const p = data.split("-");
        return `${p[2]}/${p[1]}/${p[0]}`;
    }

    return null;
}

const ctx = document.getElementById('grafico');

const chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [],
        datasets: [{
            label: 'Alunos por dia',
            data: [],
            borderRadius: 8
        }]
    }
});

onSnapshot(collection(db, "registros"), (snapshot) => {

    const contagem = {};
    const controleUnico = new Set();

    snapshot.forEach(doc => {
        const d = doc.data();

        const data = formatarData(d.data);
        const codigo = d.codigo;

        if(!data || !codigo) return;

        // 🔥 evita duplicação
        const chave = data + "_" + codigo;

        if(controleUnico.has(chave)) return;
        controleUnico.add(chave);

        if(!contagem[data]){
            contagem[data] = 0;
        }

        contagem[data]++;
    });

    const datas = Object.keys(contagem).sort((a,b)=>{
        const [d1,m1,y1] = a.split("/");
        const [d2,m2,y2] = b.split("/");
        return new Date(`${y1}-${m1}-${d1}`) - new Date(`${y2}-${m2}-${d2}`);
    });

    const valores = datas.map(d => contagem[d]);

    chart.data.labels = datas;
    chart.data.datasets[0].data = valores;
    chart.update();

});

</script>

</body>
</html>
