<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfico</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:400px;
    margin:40px auto;
}

button{
    width:90%;
    padding:12px;
    margin-top:15px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Frequência da Merenda</p>

<div class="container">
    <canvas id="grafico"></canvas>
</div>

<button onclick="window.location.href='index.html'">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 FUNÇÃO QUE CORRIGE QUALQUER DATA
function formatarData(data){
    if(!data) return "Inválido";

    // se já está no formato BR
    if(data.includes("/")) return data;

    // se está formato americano
    if(data.includes("-")){
        const partes = data.split("-");
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    return data;
}

const ctx = document.getElementById('grafico');

const chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: [],
        datasets: [{
            label: 'Alunos por dia',
            data: [],
            borderRadius: 8
        }]
    }
});

onSnapshot(collection(db, "registros"), (snapshot) => {

    const contagem = {};

    snapshot.forEach(doc => {
        const d = doc.data();

        const dataCorrigida = formatarData(d.data);

        if(!contagem[dataCorrigida]){
            contagem[dataCorrigida] = 0;
        }

        contagem[dataCorrigida]++;
    });

    const datas = Object.keys(contagem).sort((a,b)=>{
        const [d1,m1,y1] = a.split("/");
        const [d2,m2,y2] = b.split("/");
        return new Date(`${y1}-${m1}-${d1}`) - new Date(`${y2}-${m2}-${d2}`);
    });

    const valores = datas.map(d => contagem[d]);

    chart.data.labels = datas;
    chart.data.datasets[0].data = valores;
    chart.update();

});

</script>

</body>
</html>
