<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - S.C.A.E</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

.box{
    background:#f2f2f2;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>Painel Geral</h2>

<div class="container">

<div class="box">
<h3>Total Hoje</h3>
<h1 id="total">0</h1>
</div>

<div class="box" id="lista">
Carregando...
</div>

<button onclick="voltar()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hoje = new Date().toISOString().split("T")[0];

const q = query(collection(db, "registros"), where("data", "==", hoje));

onSnapshot(q, (snapshot) => {

    let total = 0;
    let html = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        // 🔥 CORREÇÃO DO UNDEFINED
        const nome = d.nome ? d.nome : "Aluno não identificado";

        html += nome + " - " + d.hora + "<br>";
        total++;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("lista").innerHTML = html || "Nenhum registro hoje";

});

window.voltar = function(){
    window.location.href="index.html";
}

</script>

</body>
</html>
