<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = "escola_antonio_barros";

let registros = [];
let alunosMap = {};

let grafico;

onSnapshot(collection(db, "escolas", escolaId, "alunos"), (snap) => {
  alunosMap = {};
  snap.forEach(doc => {
    const d = doc.data();
    alunosMap[String(d.codigo)] = d.turma || "Sem turma";
  });
});

onSnapshot(collection(db, "escolas", escolaId, "registros"), (snapshot) => {
  registros = [];

  snapshot.forEach(doc => {
    const d = doc.data();

    registros.push({
      data: d.data || "",
      turma: alunosMap[String(d.codigo)] || "Sem turma"
    });
  });

  gerarDashboard();
});

function gerarDashboard(){

  const porDia = {};
  const porTurma = {};

  registros.forEach(r => {

    // por dia
    porDia[r.data] = (porDia[r.data] || 0) + 1;

    // por turma
    porTurma[r.turma] = (porTurma[r.turma] || 0) + 1;
  });

  const labels = Object.keys(porDia);
  const dados = Object.values(porDia);

  const ctx = document.getElementById("grafico");

  if(grafico){
    grafico.destroy();
  }

  grafico = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Alunos por dia",
        data: dados
      }]
    }
  });

  // listar turmas
  const listaTurmas = document.getElementById("turmas");
  listaTurmas.innerHTML = "";

  Object.keys(porTurma).forEach(t => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerText = t + ": " + porTurma[t] + (porTurma[t] == 1 ? " aluno" : " alunos");
    listaTurmas.appendChild(div);
  });

}
</script>

<style>
body{
  font-family: Arial;
  background:#2f4a6d;
  text-align:center;
  color:white;
}

.box{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  width:320px;
  margin:30px auto;
}

.item{
  border-bottom:1px solid #ccc;
  padding:8px;
}

canvas{
  margin-top:20px;
}

button{
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  border-radius:5px;
  margin-top:15px;
}
</style>

</head>

<body>

<h1>S.C.A.E</h1>
<p>Dashboard</p>

<div class="box">

  <canvas id="grafico"></canvas>

  <h3>Alunos por turma</h3>
  <div id="turmas"></div>

  <button onclick="history.back()">Voltar</button>

</div>

</body>
</html>
