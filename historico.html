<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

.data{
    margin-top:15px;
    font-weight:bold;
    font-size:16px;
}

.item{
    padding:10px;
    border-bottom:1px solid #ccc;
}

.nome{
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>Histórico</h2>

<div class="container">
<div id="lista"></div>
</div>

<button onclick="window.location.href='index.html'">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");

onSnapshot(collection(db, "registros"), (snapshot) => {

    lista.innerHTML = "";

    const registrosPorData = {};

    snapshot.forEach(docSnap => {

        const dados = docSnap.data();

        const data = dados.data || "Sem data";

        if(!registrosPorData[data]){
            registrosPorData[data] = [];
        }

        registrosPorData[data].push({
            nome: dados.nome || "Sem nome",
            codigo: dados.codigo || "-",
            hora: dados.hora || "-"
        });

    });

    // ordenar datas (mais recente primeiro)
    const datasOrdenadas = Object.keys(registrosPorData).sort().reverse();

    datasOrdenadas.forEach(data => {

        const titulo = document.createElement("div");
        titulo.className = "data";
        titulo.innerText = data;

        lista.appendChild(titulo);

        registrosPorData[data].forEach(item => {

            const div = document.createElement("div");
            div.className = "item";

            div.innerHTML = `
                <div class="nome">${item.nome}</div>
                Código: ${item.codigo}<br>
                Hora: ${item.hora}
            `;

            lista.appendChild(div);

        });

    });

});

</script>

</body>
</html>
