<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Histórico</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f5132, #198754);
  color: white;
}

.container {
  text-align: center;
  padding: 30px 20px;
}

.card {
  background: white;
  color: #333;
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  background: #198754;
  color: white;
  font-size: 15px;
}

.linha {
  border-bottom: 1px solid #ddd;
  padding: 10px 0;
  text-align: left;
}

.topo-pdf {
  text-align: center;
  margin-bottom: 15px;
}

.topo-pdf h2 {
  margin: 5px 0;
}

.topo-pdf p {
  margin: 0;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h1>S.C.A.E</h1>
  <h3>Histórico Geral</h3>

  <div class="card" id="areaPDF">

    <div class="topo-pdf">
      <h2>Relatório de Merenda</h2>
      <p id="dataRelatorio"></p>
    </div>

    <input type="date" id="filtroData" onchange="filtrarPorData()">

    <button onclick="mostrarTodos()">Mostrar todos</button>

    <h3 id="total"></h3>

    <div id="lista"></div>

    <button onclick="gerarPDF()">Exportar PDF</button>
    <button onclick="voltar()">Voltar</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = "escola_antonio_barros";

let registros = [];

onSnapshot(collection(db, "escolas", escolaId, "registros"), (snapshot) => {
  registros = [];

  snapshot.forEach(doc => {
    const d = doc.data();

    registros.push({
      nome: d.nome,
      turma: d.turma || "Sem turma",
      data: d.data,
      hora: d.hora || ""
    });
  });

  atualizarDataRelatorio();
  renderizarLista(registros);
});

function atualizarDataRelatorio() {
  const hoje = new Date().toLocaleDateString("pt-BR");
  document.getElementById("dataRelatorio").innerText = "Gerado em: " + hoje;
}

function renderizarLista(lista) {
  const div = document.getElementById("lista");
  const total = document.getElementById("total");

  div.innerHTML = "";
  total.innerText = "Total: " + lista.length + " alunos";

  lista.forEach(r => {
    div.innerHTML += `
      <div class="linha">
        <strong>${r.nome}</strong><br>
        Turma: ${r.turma}<br>
        Data: ${r.data} ${r.hora}
      </div>
    `;
  });
}

function filtrarPorData() {
  const dataSelecionada = document.getElementById("filtroData").value;

  if (!dataSelecionada) return;

  const dataFormatada = dataSelecionada.split("-").reverse().join("/");

  const filtrados = registros.filter(r => r.data === dataFormatada);

  renderizarLista(filtrados);
}

function mostrarTodos() {
  renderizarLista(registros);
}

function gerarPDF() {
  const elemento = document.getElementById("areaPDF");

  const opt = {
    margin: 0.5,
    filename: 'relatorio_merenda.pdf',
    image: { type: 'jpeg', quality: 1 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'cm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(elemento).save();
}

function voltar() {
  window.location.href = "menu.html";
}

</script>

</body>
</html>
