<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Histórico</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #2f3a73;
    color: white;
}

.card {
    background: white;
    color: black;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>Histórico de Registros</h2>

<div id="conteudo"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SIUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatarData(data){
    const d = new Date(data);
    return d.toLocaleDateString();
}

async function carregar() {

    const querySnapshot = await getDocs(collection(db, "registros"));

    let contagem = {};

    querySnapshot.forEach((doc) => {
        const dados = doc.data();
        const data = dados.data;

        if (!contagem[data]) {
            contagem[data] = 0;
        }

        contagem[data]++;
    });

    const container = document.getElementById("conteudo");

    for (let data in contagem) {

        const div = document.createElement("div");
        div.className = "card";
        div.innerText = data + " - Total: " + contagem[data];

        container.appendChild(div);
    }
}

carregar();

</script>

</body>
</html>
