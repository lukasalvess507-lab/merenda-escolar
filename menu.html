<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Merenda Escolar</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    margin-top: 30px;
}

.container {
    margin-top: 40px;
}

button {
    display: block;
    width: 80%;
    max-width: 300px;
    margin: 10px auto;
    padding: 15px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #2c7be5;
    color: white;
}

button:hover {
    background: #1a5edb;
}
</style>
</head>

<body>

<h1>Painel - Merenda Escolar</h1>

<div class="container">

<button onclick="abrirAlunos()">Ver Alunos</button>

<button onclick="cadastrarAluno()">Cadastrar Aluno</button>

<button onclick="abrirLeitor()">Ler QR Code</button>

<button onclick="verRegistros()">Ver Registros do Dia</button>

<button onclick="verHistorico()">Histórico</button>

</div>

<script>

function abrirAlunos() {
    alert("Em breve: lista de alunos");
}

function cadastrarAluno() {
    alert("Em breve: cadastro de alunos");
}

function abrirLeitor() {
    window.location.href = "index.html";
}

function verRegistros() {
    alert("Em breve: registros do dia");
}

function verHistorico() {
    alert("Em breve: histórico");
}

</script>

</body>
</html>
