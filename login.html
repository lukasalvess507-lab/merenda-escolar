<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 40px;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 300px;
    margin: auto;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #2f3a73;
    color: white;
    border: none;
    border-radius: 5px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Acesso ao Sistema</h2>

<div class="card">

<input type="email" id="email" placeholder="Email da escola">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="cadastrar()">Criar Conta</button>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9",
  measurementId: "G-58NGTHZ9V2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    signInWithEmailAndPassword(auth, email, senha)
    .then(() => {
        window.location.href = "index.html";
    })
    .catch((error) => {
        document.getElementById("msg").innerText = error.message;
    });

}

window.cadastrar = function(){

    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    createUserWithEmailAndPassword(auth, email, senha)
    .then(() => {
        document.getElementById("msg").innerText = "Conta criada com sucesso";
    })
    .catch((error) => {
        document.getElementById("msg").innerText = error.message;
    });

}

</script>

</body>
</html>
