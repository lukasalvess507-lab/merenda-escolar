<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alunos</title>

<style>
body{
    font-family: Arial;
    background: #2f3a73;
    color: white;
    text-align: center;
    padding: 20px;
}

.container{
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

.aluno{
    padding: 10px;
    border-bottom: 1px solid #ccc;
}

button{
    margin: 5px;
}
</style>
</head>

<body>

<h2>Lista de Alunos</h2>

<div class="container" id="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

auth.onAuthStateChanged(async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const uid = user.uid;
    const lista = document.getElementById("lista");

    const snapshot = await getDocs(collection(db, "escolas", uid, "alunos"));

    lista.innerHTML = "";

    snapshot.forEach((docSnap) => {

        const aluno = docSnap.data();
        const codigo = docSnap.id;

        lista.innerHTML += `
            <div class="aluno">
                <strong>${aluno.nome}</strong><br>
                Código: ${codigo}<br>

                <button onclick="editar('${codigo}', '${aluno.nome}')">Editar</button>
                <button onclick="excluir('${codigo}')">Excluir</button>
            </div>
        `;
    });

    window.excluir = async function(codigo){
        if(confirm("Excluir aluno?")){
            await deleteDoc(doc(db, "escolas", uid, "alunos", codigo));
            location.reload();
        }
    }

    window.editar = async function(codigo, nomeAtual){

        const novoNome = prompt("Editar nome:", nomeAtual);

        if(novoNome){
            await updateDoc(doc(db, "escolas", uid, "alunos", codigo), {
                nome: novoNome
            });
            location.reload();
        }
    }

});

</script>
<button onclick="window.location.href='index.html'">Voltar</button>
</body>
</html>
