<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alunos Cadastrados</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #2f3a73;
    color: white;
}

.lista {
    margin-top: 20px;
}

.item {
    background: white;
    color: black;
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>Alunos Cadastrados</h2>

<div id="lista" class="lista"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SIUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function carregar() {

    const querySnapshot = await getDocs(collection(db, "alunos"));

    const lista = document.getElementById("lista");

    querySnapshot.forEach((doc) => {
        const dados = doc.data();

        const div = document.createElement("div");
        div.className = "item";
        div.innerText = dados.codigo + " - " + dados.nome;

        lista.appendChild(div);
    });
}

carregar();

</script>

</body>
</html>
