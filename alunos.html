<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ver Alunos</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:10px;
    max-width:400px;
    margin:50px auto;
}

.aluno{
    background:#e9e9e9;
    margin:10px;
    padding:10px;
    border-radius:8px;
    text-align:left;
}

button{
    width:95%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h3>Lista de Alunos</h3>

<div id="lista"></div>

<button onclick="voltar()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = "escola_antonio_barros";

async function carregarAlunos(){

    const lista = document.getElementById("lista");
    lista.innerHTML = "Carregando...";

    const querySnapshot = await getDocs(
        collection(db, "escolas", escolaId, "alunos")
    );

    lista.innerHTML = "";

    querySnapshot.forEach((doc) => {
        const aluno = doc.data();

        lista.innerHTML += `
            <div class="aluno">
                <b>Código:</b> ${aluno.codigo} <br>
                <b>Nome:</b> ${aluno.nome} <br>
                <b>Turma:</b> ${aluno.turma}
            </div>
        `;
    });

    if(querySnapshot.empty){
        lista.innerHTML = "Nenhum aluno encontrado";
    }
}

carregarAlunos();

window.voltar = function(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
