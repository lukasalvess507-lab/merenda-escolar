<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ver Alunos</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    text-align:center;
}

.container{
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:400px;
    margin:40px auto;
}

.card{
    background:#eee;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}

select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h3>Lista de Alunos</h3>

<select id="filtroTurma" onchange="filtrar()">
    <option value="todas">Todas as turmas</option>
</select>

<div id="lista"></div>

<button onclick="voltar()">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.appspot.com",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const escolaId = localStorage.getItem("escolaId");

let todosAlunos = [];

async function carregar(){

    const snapshot = await getDocs(collection(db, "escolas", escolaId, "alunos"));

    const turmasSet = new Set();

    todosAlunos = [];

    snapshot.forEach(doc => {
        const aluno = doc.data();
        todosAlunos.push(aluno);
        turmasSet.add(aluno.turma);
    });

    const select = document.getElementById("filtroTurma");

    turmasSet.forEach(turma => {
        const option = document.createElement("option");
        option.value = turma;
        option.textContent = turma;
        select.appendChild(option);
    });

    mostrar(todosAlunos);
}

function mostrar(lista){

    const div = document.getElementById("lista");
    div.innerHTML = "";

    lista.forEach(aluno => {
        div.innerHTML += `
        <div class="card">
            <b>Código:</b> ${aluno.codigo}<br>
            <b>Nome:</b> ${aluno.nome}<br>
            <b>Turma:</b> ${aluno.turma}
        </div>
        `;
    });
}

window.filtrar = function(){

    const turma = document.getElementById("filtroTurma").value;

    if(turma === "todas"){
        mostrar(todosAlunos);
    } else {
        const filtrados = todosAlunos.filter(a => a.turma === turma);
        mostrar(filtrados);
    }
}

window.voltar = function(){
    window.location.href = "index.html";
}

carregar();

</script>

</body>
</html>
