<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastrar Aluno</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

#msg{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Cadastrar Aluno</p>

<div class="container">

<input id="codigo" placeholder="Código do aluno">
<input id="nome" placeholder="Nome do aluno">

<button id="btnSalvar">Salvar</button>

<p id="msg"></p>

<button onclick="window.location.href='index.html'">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const msg = document.getElementById("msg");

document.getElementById("btnSalvar").addEventListener("click", async () => {

    const codigo = document.getElementById("codigo").value.trim();
    const nome = document.getElementById("nome").value.trim();

    msg.innerText = ""; // limpa antes

    if(!codigo || !nome){
        msg.innerText = "Preencha todos os campos";
        return;
    }

    try {

        await setDoc(doc(db, "alunos", codigo), {
            codigo: codigo,
            nome: nome
        });

        msg.innerText = "Aluno cadastrado com sucesso";

        // limpa campos
        document.getElementById("codigo").value = "";
        document.getElementById("nome").value = "";

        // REMOVE mensagem depois de 2 segundos
        setTimeout(() => {
            msg.innerText = "";
        }, 2000);

    } catch(e){
        msg.innerText = "Erro ao salvar";
        console.error(e);
    }

});

</script>

</body>
</html>
