<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

input{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}

#msg{
    margin-top:10px;
    color:green;
}
</style>
</head>

<body>

<h2>Cadastrar Aluno</h2>

<div class="container">

<input id="codigo" placeholder="Código">
<input id="nome" placeholder="Nome do aluno">
<input id="turma" placeholder="Turma (ex: 9º A)">

<button onclick="salvar()">Salvar</button>

<p id="msg"></p>

</div>

<button onclick="window.location.href='index.html'">Voltar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.salvar = async function(){

    const codigo = document.getElementById("codigo").value;
    const nome = document.getElementById("nome").value;
    const turma = document.getElementById("turma").value;

    if(!codigo || !nome || !turma){
        alert("Preencha todos os campos");
        return;
    }

    await addDoc(collection(db, "alunos"), {
        codigo: codigo,
        nome: nome,
        turma: turma
    });

    document.getElementById("msg").innerText = "Aluno cadastrado com sucesso";

    setTimeout(()=>{
        document.getElementById("msg").innerText = "";
    },2000);

    document.getElementById("codigo").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("turma").value = "";

}

</script>

</body>
</html>
