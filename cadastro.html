<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastrar - S.C.A.E</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.96);
}

#msg{
    margin-top:10px;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Cadastrar Aluno</p>

<div class="container">

<input id="codigo" placeholder="Código do aluno">
<input id="nome" placeholder="Nome do aluno">

<button onclick="salvar()">Salvar</button>
<button onclick="voltar()">Voltar</button>

<p id="msg"></p>

</div>

<script>
function voltar(){
    window.location.href="index.html";
}
</script>

</body>
</html>
