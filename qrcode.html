<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor QR - S.C.A.E</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

#reader{
    width:100%;
    border:4px solid transparent;
    border-radius:10px;
}

#msg{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
    min-height:30px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Leitor de QR Code</p>

<div class="container">

<div id="reader"></div>

<p id="msg">Aguardando leitura...</p>

<button onclick="window.location.href='index.html'">Voltar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCGA7zSI9Ujwt4Auw9-R2V-SlUc6476zww",
  authDomain: "merenda-escolar-2.firebaseapp.com",
  projectId: "merenda-escolar-2",
  storageBucket: "merenda-escolar-2.firebasestorage.app",
  messagingSenderId: "608430650860",
  appId: "1:608430650860:web:eb8dd66b5cf96615c83cc9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const hoje = new Date().toISOString().split("T")[0];
const msg = document.getElementById("msg");
const readerDiv = document.getElementById("reader");

let bloqueado = false; // controla leitura repetida

function beep(){
    const audio = new Audio("https://www.soundjay.com/buttons/sounds/beep-07.mp3");
    audio.play();
}

function feedback(cor, texto){
    readerDiv.style.border = "4px solid " + cor;
    msg.innerText = texto;

    setTimeout(() => {
        readerDiv.style.border = "4px solid transparent";
        msg.innerText = "Aguardando leitura...";
        bloqueado = false;
    }, 3000);
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    async (codigo) => {

        if(bloqueado) return;
        bloqueado = true;

        msg.innerText = "Lendo...";

        const alunoRef = doc(db, "alunos", codigo);
        const alunoSnap = await getDoc(alunoRef);

        if (!alunoSnap.exists()) {
            feedback("orange", "Aluno não encontrado");
            return;
        }

        const nome = alunoSnap.data().nome;

        const registroRef = doc(db, "registros", codigo + "_" + hoje);
        const registroSnap = await getDoc(registroRef);

        if (registroSnap.exists()) {
            feedback("red", "ALUNO JÁ REGISTRADO");
            return;
        }

        const hora = new Date().toLocaleTimeString();

        await setDoc(registroRef, {
            nome: nome,
            codigo: codigo,
            data: hoje,
            hora: hora
        });

        beep();

        feedback("green", nome.toUpperCase());

    }
);

</script>

</body>
</html>
