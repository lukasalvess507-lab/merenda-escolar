<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerar QR Code</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
}

canvas{
    margin-top:15px;
}

</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Gerar QR Code</p>

<div class="container">

<input id="codigo" placeholder="Digite o código do aluno">

<button onclick="gerar()">Gerar QR Code</button>

<canvas id="canvas"></canvas>

<button onclick="baixar()">Baixar QR Code</button>

</div>

<button onclick="window.location.href='index.html'">Voltar</button>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function gerar(){

    const codigo = document.getElementById("codigo").value;

    if(!codigo){
        alert("Digite o código");
        return;
    }

    // gerar QR base
    QRCode.toCanvas(canvas, codigo, {
        width: 250,
        margin: 2,
        errorCorrectionLevel: 'H' // ALTA correção (IMPORTANTE)
    }, function (error) {

        if(error) return console.error(error);

        // desenhar código no centro
        const tamanho = 250;

        const caixa = tamanho * 0.18; // ~10-18% seguro
        const pos = (tamanho - caixa) / 2;

        // fundo branco
        ctx.fillStyle = "white";
        ctx.fillRect(pos, pos, caixa, caixa);

        // texto pequeno
        ctx.fillStyle = "black";
        ctx.font = "bold 20px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.fillText(codigo, tamanho/2, tamanho/2);

    });

}

function baixar(){

    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = canvas.toDataURL();
    link.click();

}

</script>

</body>
</html>
