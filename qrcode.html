<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerar QR Code</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #1e3a5f, #2a4d69);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    max-width:350px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#1f4d2e;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
}

#qrcode{
    margin-top:20px;
}

#btnDownload{
    display:none;
}
</style>
</head>

<body>

<h2>S.C.A.E</h2>
<p>Gerar QR Code</p>

<div class="container">

<input id="codigo" placeholder="Digite o código do aluno">

<button onclick="gerarQR()">Gerar QR Code</button>

<div id="qrcode"></div>

<button id="btnDownload" onclick="baixarQR()">Baixar QR Code</button>

<button onclick="window.location.href='index.html'">Voltar</button>

</div>

<script>

let canvasQR = null;

function gerarQR(){

    const codigo = document.getElementById("codigo").value.trim();

    if(!codigo){
        alert("Digite um código");
        return;
    }

    const qrcodeDiv = document.getElementById("qrcode");
    qrcodeDiv.innerHTML = "";

    QRCode.toCanvas(codigo, { width: 200 }, function (error, canvas) {
        if(error) return console.error(error);

        qrcodeDiv.appendChild(canvas);
        canvasQR = canvas;

        // MOSTRA botão baixar
        document.getElementById("btnDownload").style.display = "block";
    });

}

function baixarQR(){

    if(!canvasQR) return;

    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = canvasQR.toDataURL();
    link.click();
}

</script>

</body>
</html>
